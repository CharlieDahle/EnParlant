<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Learning App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="saved.css">
    <script src="popup.js" defer></script>
</head>

<body>
    <div class="saved-container">
        <div class="header">
            <i class="fas fa-arrow-left header-icon clickable-arrow larger-arrow" id="backArrow"></i>
            <h1>SAVED</h1>
        </div>
        <div class="content">
            <div class="tabs">
                <div class="tab" id="wordsTab">Words</div>
                <div class="tab" id="phrasesTab">Phrases</div>
            </div>
            <div class="tab-content" id="wordsContent">
                <p>This is a test content for the "Words" tab.</p>
                <ul>
                    <li>Word 1</li>
                    <li>Word 2</li>
                    <li>Word 3</li>
                </ul>
            </div>
            <div class="tab-content" id="phrasesContent">
                <p>This is a test content for the "Phrases" tab.</p>
                <ol>
                    <li>Phrase 1</li>
                    <li>Phrase 2</li>
                    <li>Phrase 3</li>
                </ol>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
